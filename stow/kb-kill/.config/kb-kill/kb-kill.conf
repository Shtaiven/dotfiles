# kb-kill configuration
#
# Disable/enable a target keyboard on a global hotkey. Any keyboard may press
# the kill hotkey; while killed, the target keyboard eats every key except the
# wake hotkey (so it can always wake itself).

# Target keyboard(s) to kill. Case-insensitive substring(s) matched against the
# device name; comma-separated for several. Run `kb-kill detect` to see names.
keyboards = AT Translated Set 2 keyboard

# Hotkey to disable the target keyboard(s).
# Tokens joined by '+'. Modifier aliases (match either side): ctrl, alt, shift,
# super/meta/win. Pin a side with l/r: lctrl, rctrl, lalt, ralt, lshift, ...
# Other tokens: a letter a-z, a raw KEY_* name, or a numeric keycode.
kill_combo = ctrl+alt+shift+k

# Hotkey to re-enable the target keyboard(s). Honored on the killed keyboard
# itself, which is the anti-lockout guarantee.
wake_combo = ctrl+alt+shift+u

# Only grab the *physical* keyboard if no input-remapper "forwarded" device
# exists. Keep false so kb-kill never holds the physical device and
# input-remapper can always (re)grab it - including across an IR restart.
physical_fallback = false
