# mouse
set -g mouse on

# smart-splits.nvim integration (only if plugin is installed)
if-shell "test -f ~/.local/share/nvim/lazy/smart-splits.nvim/bin/smart-splits.sh" {
  bind -n M-h run "~/.local/share/nvim/lazy/smart-splits.nvim/bin/smart-splits.sh --direction Left"
  bind -n M-j run "~/.local/share/nvim/lazy/smart-splits.nvim/bin/smart-splits.sh --direction Down"
  bind -n M-k run "~/.local/share/nvim/lazy/smart-splits.nvim/bin/smart-splits.sh --direction Up"
  bind -n M-l run "~/.local/share/nvim/lazy/smart-splits.nvim/bin/smart-splits.sh --direction Right"
  bind -n C-M-h run "~/.local/share/nvim/lazy/smart-splits.nvim/bin/smart-splits.sh --direction Left --resize"
  bind -n C-M-j run "~/.local/share/nvim/lazy/smart-splits.nvim/bin/smart-splits.sh --direction Down --resize"
  bind -n C-M-k run "~/.local/share/nvim/lazy/smart-splits.nvim/bin/smart-splits.sh --direction Up --resize"
  bind -n C-M-l run "~/.local/share/nvim/lazy/smart-splits.nvim/bin/smart-splits.sh --direction Right --resize"
}
