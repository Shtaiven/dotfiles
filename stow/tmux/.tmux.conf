# prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# mouse
set -g mouse on

# sensible defaults
set -s escape-time 0
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g focus-events on
setw -g aggressive-resize on
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# appearance
set -g menu-border-lines rounded
set -g popup-border-lines rounded
set -g status-style bg=default

# terminal support
set -g default-terminal "tmux-256color"
set -as terminal-features ",*256col*:RGB"

# which-key: fzf popup for keybindings
bind ? display-popup -E -w 80% -h 80% "tmux list-keys | { command -v fzf >/dev/null 2>&1 && fzf --no-sort --reverse || less; }"

# smart-splits.nvim integration
# @pane-is-vim is set by the nvim smart-splits plugin when nvim is focused
bind -n M-h if -F '#{@pane-is-vim}' 'send-keys M-h' 'select-pane -L'
bind -n M-j if -F '#{@pane-is-vim}' 'send-keys M-j' 'select-pane -D'
bind -n M-k if -F '#{@pane-is-vim}' 'send-keys M-k' 'select-pane -U'
bind -n M-l if -F '#{@pane-is-vim}' 'send-keys M-l' 'select-pane -R'
bind -n C-M-h if -F '#{@pane-is-vim}' 'send-keys C-M-h' 'resize-pane -L 3'
bind -n C-M-j if -F '#{@pane-is-vim}' 'send-keys C-M-j' 'resize-pane -D 3'
bind -n C-M-k if -F '#{@pane-is-vim}' 'send-keys C-M-k' 'resize-pane -U 3'
bind -n C-M-l if -F '#{@pane-is-vim}' 'send-keys C-M-l' 'resize-pane -R 3'

# plugins (TPM)
# auto-bootstrap TPM if not installed
if "test ! -d ~/.tmux/plugins/tpm" \
  "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'omerxx/tmux-sessionx'

# tmux-which-key: menu popup on prefix+Space (prefix+? is the fzf fallback)
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @tmux-which-key-xdg-enable 1

# continuum: auto-save every 15 min, restore on start only if a save exists
if "[ -e $HOME/.tmux/resurrect/last ]" \
  "set -g @continuum-restore 'on'"

# initialize TPM (must be last line)
run '~/.tmux/plugins/tpm/tpm'
